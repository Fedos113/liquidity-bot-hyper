<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIQBOT2</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0d1117;
  color: #c9d1d9;
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 24px 16px;
}
.container { max-width: 960px; width: 100%; }
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 1px;
  color: #f0f6fc;
}
.btn-refresh {
  background: #238636;
  color: #fff;
  border: 1px solid #2ea043;
  padding: 10px 28px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s;
}
.btn-refresh:hover { background: #2ea043; }
.btn-refresh:disabled { opacity: .5; cursor: not-allowed; }

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 16px;
}
.card .label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: #8b949e;
  margin-bottom: 6px;
}
.card .value {
  font-size: 20px;
  font-weight: 600;
  color: #f0f6fc;
}
.card .value.mono { font-family: 'SFMono', 'Cascadia Code', monospace; font-size: 14px; }
.card .value.green { color: #3fb950; }
.card .value.red { color: #f85149; }
.card .value.neutral { color: #d29922; }
.card.full { grid-column: 1 / -1; }
.card-row {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
}
.card-row .stat { flex: 1; min-width: 80px; }

.footer {
  text-align: center;
  font-size: 12px;
  color: #484f58;
  margin-top: 24px;
}

.chart-card .card-header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.chart-controls { display: flex; gap: 4px; }
.chart-btn {
  background: #21262d;
  color: #8b949e;
  border: 1px solid #30363d;
  padding: 4px 12px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.chart-btn:hover { background: #30363d; color: #c9d1d9; }
.chart-btn.active { background: #1f6feb; border-color: #388bfd; color: #fff; }
.chart-wrapper { position: relative; height: 280px; }

@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; }
  .header { flex-direction: column; gap: 12px; align-items: stretch; text-align: center; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>LIQBOT2</h1>
    <button class="btn-refresh" id="refreshBtn" onclick="refresh()">REFRESH</button>
  </div>

  <div class="grid">
    <div class="card">
      <div class="label">Wallet</div>
      <div class="value mono" id="wallet">—</div>
    </div>
    <div class="card">
      <div class="label">Current Price</div>
      <div class="value mono" id="price">—</div>
    </div>
    <div class="card">
      <div class="label">Position Value</div>
      <div class="value" id="posValue">—</div>
    </div>
    <div class="card">
      <div class="label">Portfolio Value</div>
      <div class="value" id="portfolioValue">—</div>
    </div>

    <div class="card full">
      <div class="label">P&amp;L</div>
      <div class="card-row" id="pnlRow">
        <div class="stat"><span class="label">24h</span><span class="value" id="pnl24h">—</span></div>
        <div class="stat"><span class="label">7d</span><span class="value" id="pnl7d">—</span></div>
        <div class="stat"><span class="label">All</span><span class="value" id="pnlAll">—</span></div>
      </div>
    </div>

    <div class="card full chart-card">
      <div class="card-header-row">
        <div class="label">PnL Chart</div>
        <div class="chart-controls">
          <button class="chart-btn active" data-period="24h">24h</button>
          <button class="chart-btn" data-period="7d">7d</button>
          <button class="chart-btn" data-period="all">All</button>
        </div>
      </div>
      <div class="chart-wrapper">
        <canvas id="pnlChart" height="280"></canvas>
      </div>
    </div>
  </div>

  <div class="footer">liqbot2 &middot; manual refresh only</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script>
function fmtAddr(a) { return a ? a.slice(0,6)+'...'+a.slice(-4) : '—'; }
function fmtUsd(v) { return v != null ? '$'+Number(v).toLocaleString('en',{minimumFractionDigits:2}) : '—'; }
function fmtPnl(v) {
  if (v == null) return '—';
  const cls = v > 0 ? 'green' : v < 0 ? 'red' : 'neutral';
  const sign = v > 0 ? '+' : '';
  return `<span class="${cls}">${sign}$${Number(v).toLocaleString('en',{minimumFractionDigits:2})}</span>`;
}
let pnlChart = null;

async function loadChart(period) {
  try {
    const res = await fetch(`/chart?period=${period}`);
    const data = await res.json();

    if (!data.labels || data.labels.length < 2) return;

    const labels = data.labels.map(ts => new Date(ts * 1000));
    const values = data.pnl;
    const lastVal = values[values.length - 1];
    const lineColor = lastVal >= 0 ? '#3fb950' : '#f85149';
    const fillColor = lastVal >= 0 ? 'rgba(63,185,80,0.12)' : 'rgba(248,81,73,0.12)';

    if (pnlChart) pnlChart.destroy();

    const ctx = document.getElementById('pnlChart').getContext('2d');
    pnlChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'PnL',
          data: values,
          borderColor: lineColor,
          backgroundColor: fillColor,
          fill: true,
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 2,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => '$' + ctx.parsed.y.toFixed(2) } } },
        scales: {
          x: {
            type: 'time',
            time: { tooltipFormat: 'MMM dd, HH:mm', displayFormats: { minute: 'HH:mm', hour: 'HH:mm', day: 'MMM dd' } },
            grid: { display: false },
            ticks: { color: '#8b949e', maxTicksLimit: 8 },
          },
          y: {
            grid: { color: '#21262d' },
            ticks: { color: '#8b949e', callback: v => '$' + v.toLocaleString() }
          }
        }
      }
    });
  } catch (e) {
    console.error('Chart load failed:', e);
  }
}

async function refresh() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = 'LOADING...';

  try {
    const res = await fetch('/refresh', { method: 'POST' });
    const d = await res.json();

    document.getElementById('wallet').textContent = fmtAddr(d.wallet);
    document.getElementById('price').textContent = fmtUsd(d.current_price);
    document.getElementById('posValue').textContent = fmtUsd(d.position_value);
    document.getElementById('portfolioValue').textContent = fmtUsd(d.portfolio_value);

    document.getElementById('pnl24h').innerHTML = fmtPnl(d.pnl['24h']);
    document.getElementById('pnl7d').innerHTML = fmtPnl(d.pnl['7d']);
    document.getElementById('pnlAll').innerHTML = fmtPnl(d.pnl.all);
  } catch (e) {
    alert('Refresh failed: '+e.message);
  }

  btn.disabled = false;
  btn.textContent = 'REFRESH';
}

refresh();
loadChart('24h');
setInterval(refresh, 3600000);
setInterval(() => { const a = document.querySelector('.chart-btn.active'); if (a) loadChart(a.dataset.period); }, 3600000);

document.querySelectorAll('.chart-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.chart-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    loadChart(this.dataset.period);
  });
});
</script>
</body>
</html>
